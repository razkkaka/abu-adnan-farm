<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk / Daftar - Abu Farm</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --green: #15803d; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background-color: #f0fdf4; overflow-y: auto; overflow-x: hidden;}
    .hero-bg { background: linear-gradient(135deg, rgba(5,46,22,0.92), rgba(20,83,45,0.88)), url('https://images.unsplash.com/photo-1500595046743-cd271d694d30?q=80&w=2000') center/cover; }
    .glass { background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); }
    .tab-active { background: var(--green); color: white; }
    .tab-inactive { background: transparent; color: #6b7280; }
    input:focus { border-color: var(--green) !important; outline: none; box-shadow: 0 0 0 3px rgba(21,128,61,0.12); }
    .btn-primary { background: var(--green); transition: all 0.2s; }
  </style>
</head>
<body class="min-h-screen flex">
  <div class="hero-bg hidden md:flex flex-col justify-center p-16 w-1/2 sticky top-0 h-screen">
    <div class="flex items-center gap-3 mb-8"><div class="bg-green-500 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow text-2xl">🐄</div><span class="text-white font-bold text-xl">Abu Farm</span></div>
    <h1 class="text-5xl font-bold text-white mb-4 leading-tight" style="font-family:'Playfair Display',serif;">Hewan Qurban<br>Terpercaya</h1>
    <p class="text-green-100 text-lg leading-relaxed">Platform digital untuk melacak dan memesan hewan qurban langsung dari kandang Bogor.</p>
  </div>

  <div class="glass flex flex-col items-center py-12 px-6 w-full md:w-1/2 min-h-screen">
    <div class="w-full max-w-md my-auto">
      <div class="md:hidden text-center mb-8"><div class="text-4xl mb-2">🐄</div><div class="font-bold text-green-900 text-xl">Abu Farm</div></div>
      <h2 class="text-3xl font-bold text-gray-900 mb-2" style="font-family:'Playfair Display',serif;">Selamat Datang</h2>
      <p class="text-gray-500 mb-8 text-sm">Masuk atau buat akun baru untuk memesan</p>

      <div class="flex bg-gray-100 rounded-xl p-1 mb-8">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold tab-active">Masuk</button>
        <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2.5 rounded-lg text-sm font-semibold tab-inactive">Daftar Akun</button>
      </div>

      <div id="form-login">
        <div class="space-y-4">
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Email</label><input type="email" id="login-email" class="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-sm font-medium"></div>
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Password</label><input type="password" id="login-pass" class="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-sm font-medium"></div>
        </div>
        <div id="login-error" class="hidden mt-3 bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl border border-red-100"></div>
        <button onclick="doLogin()" id="btn-login" class="btn-primary w-full mt-6 py-4 rounded-xl text-white font-bold text-sm shadow-lg">Masuk Sekarang →</button>
      </div>

      <div id="form-register" class="hidden">
        <div class="space-y-4">
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Nama Lengkap</label><input type="text" id="reg-name" class="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-sm"></div>
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Email</label><input type="email" id="reg-email" class="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-sm"></div>
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Password</label><input type="password" id="reg-pass" class="w-full bg-gray-50 border border-gray-200 px-4 py-3.5 rounded-xl text-sm"></div>
        </div>
        <div id="reg-error" class="hidden mt-3 bg-red-50 text-red-600 text-sm px-4 py-3 rounded-xl"></div>
        <button onclick="doRegister()" id="btn-register" class="btn-primary w-full mt-6 py-4 rounded-xl text-white font-bold text-sm shadow-lg">Buat Akun Gratis →</button>
      </div>
      <div class="text-center mt-6"><a href="/" class="text-sm text-green-600 hover:underline">Kembali ke Beranda</a></div>
    </div>
  </div>

<script>
  function switchTab(t) {
    document.getElementById('form-login').classList.toggle('hidden', t!=='login');
    document.getElementById('form-register').classList.toggle('hidden', t==='login');
    document.getElementById('tab-login').className = `flex-1 py-2.5 rounded-lg text-sm font-semibold ${t==='login'?'tab-active':'tab-inactive'}`;
    document.getElementById('tab-register').className = `flex-1 py-2.5 rounded-lg text-sm font-semibold ${t!=='login'?'tab-active':'tab-inactive'}`;
  }

  async function doLogin() {
    const btn = document.getElementById('btn-login'); btn.textContent = 'Memproses...';
    try {
      const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email: document.getElementById('login-email').value, password: document.getElementById('login-pass').value}) });
      const d = await res.json();
      if(res.ok) { localStorage.setItem('ab_token', d.token); localStorage.setItem('ab_user', JSON.stringify(d.user)); window.location.href = d.user.role === 'admin' ? '/admin' : '/dashboard'; }
      else { document.getElementById('login-error').textContent = d.error; document.getElementById('login-error').classList.remove('hidden'); btn.textContent = 'Masuk Sekarang →'; }
    } catch(e) { btn.textContent = 'Masuk Sekarang →'; }
  }

  async function doRegister() {
    const btn = document.getElementById('btn-register'); btn.textContent = 'Memproses...';
    try {
      const res = await fetch('/api/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name: document.getElementById('reg-name').value, email: document.getElementById('reg-email').value, password: document.getElementById('reg-pass').value}) });
      if(res.ok) { alert('Berhasil daftar! Silakan masuk.'); switchTab('login'); }
      else { const d = await res.json(); document.getElementById('reg-error').textContent = d.error; document.getElementById('reg-error').classList.remove('hidden'); }
      btn.textContent = 'Buat Akun Gratis →';
    } catch(e) { btn.textContent = 'Buat Akun Gratis →'; }
  }
</script>
</body>
</html>
