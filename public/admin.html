<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Abu Farm</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>if(!localStorage.getItem('ab_token') || JSON.parse(localStorage.getItem('ab_user')).role !== 'admin') window.location.href='/login';</script>
  <style>.modal-bg { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }</style>
</head>
<body class="flex min-h-screen bg-green-50 font-[Plus_Jakarta_Sans]">

<aside class="w-64 bg-green-950 text-white flex flex-col fixed h-full z-20">
  <div class="p-6 border-b border-green-800 flex items-center gap-3">
    <div class="bg-green-500 text-white w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow">🐄</div>
    <div><div class="font-extrabold text-lg leading-none">Abu Farm</div></div>
  </div>
  <nav class="flex-1 p-4 space-y-2 text-sm mt-4">
    <button onclick="nav('overview')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-green-800 bg-green-800 font-bold">📊 Overview</button>
    <button onclick="nav('ternak')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-green-800">🐄 Data Ternak</button>
    <button onclick="nav('pesanan')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-green-800">🧾 Pesanan</button>
    <button onclick="nav('users')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-green-800">👥 Pengguna</button>
    <button onclick="nav('pakan')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-green-800">🌾 Stok Pakan</button>
    <button onclick="nav('kesehatan')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-green-800">💊 Kesehatan</button>
  </nav>
</aside>

<main class="flex-1 ml-64 p-8">
  <div id="content"></div>
</main>

<div id="modal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl w-full max-w-lg shadow-2xl p-8" onclick="event.stopPropagation()">
    <h3 id="modal-title" class="text-xl font-bold mb-6">Form</h3>
    <div id="modal-body" class="grid grid-cols-2 gap-4"></div>
    <div class="flex gap-3 mt-6">
      <button onclick="document.getElementById('modal').classList.add('hidden')" class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold">Batal</button>
      <button id="modal-save" class="flex-1 bg-green-700 text-white py-3 rounded-xl font-bold">Simpan</button>
    </div>
  </div>
</div>

<script>
  const H = {'Authorization': `Bearer ${localStorage.getItem('ab_token')}`, 'Content-Type': 'application/json'};
  let currentBase64 = ''; // State untuk menyimpan hasil convert image file ke base64

  function nav(page) {
    document.querySelectorAll('aside button').forEach(b => b.classList.remove('bg-green-800', 'font-bold'));
    event.currentTarget.classList.add('bg-green-800', 'font-bold');
    if(page==='overview') renderOverview();
    if(page==='ternak') renderTernak();
    if(page==='pesanan') renderPesanan();
    if(page==='users') renderUsers();
    if(page==='pakan') renderPakan();
    if(page==='kesehatan') renderKesehatan();
  }

  // --- HELPER UNTUK MODAL DINAMIS ---
  function openModal(title, fields, onSave) {
    document.getElementById('modal-title').textContent = title;
    const body = document.getElementById('modal-body');
    body.innerHTML = ''; currentBase64 = '';
    
    fields.forEach(f => {
      const col = f.col || 'col-span-2';
      let inputHtml = '';
      if(f.type === 'file') {
         inputHtml = `<input type="file" id="${f.id}" accept="image/*" class="w-full bg-gray-50 border p-2 rounded-lg" onchange="convertBase64(this)">`;
      } else if(f.type === 'select') {
         inputHtml = `<select id="${f.id}" class="w-full bg-gray-50 border p-2 rounded-lg">${f.opts.map(o=>`<option value="${o}" ${o===f.val?'selected':''}>${o}</option>`).join('')}</select>`;
      } else {
         inputHtml = `<input type="${f.type||'text'}" id="${f.id}" value="${f.val||''}" class="w-full bg-gray-50 border p-2 rounded-lg">`;
      }
      body.innerHTML += `<div class="${col}"><label class="text-xs font-bold text-gray-500 mb-1 block">${f.label}</label>${inputHtml}</div>`;
    });
    
    document.getElementById('modal-save').onclick = () => { onSave(); document.getElementById('modal').classList.add('hidden'); };
    document.getElementById('modal').classList.remove('hidden');
  }

  function convertBase64(input) {
    const file = input.files[0];
    if(file) { const r = new FileReader(); r.onload = (e) => currentBase64 = e.target.result; r.readAsDataURL(file); }
  }

  // --- RENDER PAGES ---
  async function renderOverview() {
    const d = await (await fetch('/api/admin/stats', {headers:H})).json();
    document.getElementById('content').innerHTML = `<h2 class="text-2xl font-bold mb-6">Overview</h2>
      <div class="grid grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><div class="text-gray-500 text-sm font-bold">Total Ternak</div><div class="text-4xl font-extrabold">${d.ternak}</div></div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><div class="text-gray-500 text-sm font-bold">Pesanan Pending</div><div class="text-4xl font-extrabold text-amber-600">${d.pesanan_pending}</div></div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100"><div class="text-gray-500 text-sm font-bold">Total Pelanggan</div><div class="text-4xl font-extrabold text-blue-600">${d.total_users}</div></div>
      </div>`;
  }

  async function renderTernak() {
    const data = await (await fetch('/api/admin/ternak', {headers:H})).json();
    let trs = data.map(t => `<tr class="border-b"><td class="p-4 font-bold text-sm">${t.tag}</td><td class="p-4 font-semibold">${t.jenis}</td><td class="p-4">${t.bobot}kg</td><td class="p-4">Rp ${t.harga.toLocaleString()}</td><td class="p-4 text-xs font-bold">${t.status}</td>
      <td class="p-4"><button onclick='editTernak(${JSON.stringify(t)})' class="text-blue-600 font-bold mr-3">Edit</button><button onclick="hapus('/api/admin/ternak/${t.id}', renderTernak)" class="text-red-600 font-bold">Hapus</button></td></tr>`).join('');
    
    document.getElementById('content').innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Data Ternak</h2><button onclick="tambahTernak()" class="bg-green-700 text-white px-4 py-2 rounded-lg font-bold">+ Tambah</button></div>
      <div class="bg-white rounded-2xl border overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-50"><tr><th class="p-4">TAG</th><th class="p-4">JENIS</th><th class="p-4">BOBOT</th><th class="p-4">HARGA</th><th class="p-4">STATUS</th><th class="p-4">AKSI</th></tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  async function renderPesanan() {
    const data = await (await fetch('/api/admin/pesanan', {headers:H})).json();
    let trs = data.map(p => `<tr class="border-b"><td class="p-4 font-bold text-green-700">${p.order_id}</td><td class="p-4 text-sm"><div class="font-bold">${p.buyer_name}</div></td><td class="p-4 text-sm font-semibold">${p.jumlah}x ${p.jenis}<div class="text-xs text-gray-400">Tag: ${p.detail_hewan}</div></td><td class="p-4 font-bold">Rp ${p.total_harga.toLocaleString()}</td><td class="p-4 text-xs font-bold">${p.status}</td><td class="p-4">${p.status==='Menunggu Pembayaran'?`<button onclick="updatePesanan(${p.id}, 'Lunas')" class="text-white bg-green-600 px-3 py-1 rounded-lg text-xs font-bold">Konfirmasi Lunas</button>`:'-'}</td></tr>`).join('');
    document.getElementById('content').innerHTML = `<h2 class="text-2xl font-bold mb-6">Manajemen Pesanan</h2><div class="bg-white rounded-2xl border overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-50"><tr><th class="p-4">ORDER ID</th><th class="p-4">PEMBELI</th><th class="p-4">PESANAN (TAG)</th><th class="p-4">TOTAL</th><th class="p-4">STATUS</th><th class="p-4">AKSI</th></tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  async function renderPakan() {
    const data = await (await fetch('/api/admin/pakan', {headers:H})).json();
    let trs = data.map(p => `<tr class="border-b"><td class="p-4 font-bold">${p.jenis_pakan}</td><td class="p-4">${p.stok_kg} kg</td><td class="p-4 text-sm font-bold text-amber-600">${p.estimasi_hari} Hari</td><td class="p-4"><button onclick='editPakan(${JSON.stringify(p)})' class="text-blue-600 font-bold mr-3">Edit</button><button onclick="hapus('/api/admin/pakan/${p.id}', renderPakan)" class="text-red-600 font-bold">Hapus</button></td></tr>`).join('');
    document.getElementById('content').innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Stok Pakan</h2><button onclick="tambahPakan()" class="bg-green-700 text-white px-4 py-2 rounded-lg font-bold">+ Tambah Pakan</button></div><div class="bg-white rounded-2xl border overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-50"><tr><th class="p-4">JENIS PAKAN</th><th class="p-4">STOK (KG)</th><th class="p-4">ESTIMASI HABIS</th><th class="p-4">AKSI</th></tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  async function renderKesehatan() {
    const data = await (await fetch('/api/admin/kesehatan', {headers:H})).json();
    let trs = data.map(k => `<tr class="border-b"><td class="p-4 font-bold">${k.ternak_tag}</td><td class="p-4">${k.tanggal}</td><td class="p-4 text-sm">${k.riwayat_sakit}</td><td class="p-4 text-sm font-semibold">${k.tindakan}</td><td class="p-4"><button onclick='editKes(${JSON.stringify(k)})' class="text-blue-600 font-bold mr-3">Edit</button><button onclick="hapus('/api/admin/kesehatan/${k.id}', renderKesehatan)" class="text-red-600 font-bold">Hapus</button></td></tr>`).join('');
    document.getElementById('content').innerHTML = `<div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Data Kesehatan</h2><button onclick="tambahKes()" class="bg-green-700 text-white px-4 py-2 rounded-lg font-bold">+ Tambah Data</button></div><div class="bg-white rounded-2xl border overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-50"><tr><th class="p-4">TAG</th><th class="p-4">TANGGAL</th><th class="p-4">SAKIT</th><th class="p-4">TINDAKAN</th><th class="p-4">AKSI</th></tr></thead><tbody>${trs}</tbody></table></div>`;
  }
  
  async function renderUsers() {
    const data = await (await fetch('/api/admin/users', {headers:H})).json();
    let trs = data.map(u => `<tr class="border-b"><td class="p-4 font-bold">${u.name}</td><td class="p-4">${u.email}</td><td class="p-4 font-bold text-sm">${u.role}</td><td class="p-4"><button onclick='editUser(${JSON.stringify(u)})' class="text-blue-600 font-bold mr-3">Edit</button><button onclick="hapus('/api/admin/users/${u.id}', renderUsers)" class="text-red-600 font-bold">Hapus</button></td></tr>`).join('');
    document.getElementById('content').innerHTML = `<h2 class="text-2xl font-bold mb-6">Pengguna</h2><div class="bg-white rounded-2xl border overflow-hidden"><table class="w-full text-left"><thead class="bg-gray-50"><tr><th class="p-4">NAMA</th><th class="p-4">EMAIL</th><th class="p-4">ROLE</th><th class="p-4">AKSI</th></tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  // --- CRUD ACTIONS ---
  async function hapus(url, reloadFn) { if(confirm('Yakin hapus data ini?')) { await fetch(url, {method:'DELETE', headers:H}); reloadFn(); } }
  
  async function updatePesanan(id, status) { await fetch(`/api/admin/pesanan/${id}/status`, {method:'PUT', headers:H, body:JSON.stringify({status})}); renderPesanan(); }

  function tambahTernak() {
    openModal('Tambah Ternak', [
      {id:'t_tag', label:'Tag Unik', col:'col-span-1'}, {id:'t_jenis', label:'Jenis', col:'col-span-1'},
      {id:'t_bobot', label:'Bobot (kg)', type:'number', col:'col-span-1'}, {id:'t_umur', label:'Umur', col:'col-span-1'},
      {id:'t_harga', label:'Harga', type:'number'}, {id:'t_img', label:'Upload Foto', type:'file'}
    ], async () => {
      const payload = { tag: document.getElementById('t_tag').value, jenis: document.getElementById('t_jenis').value, bobot: parseInt(document.getElementById('t_bobot').value), umur: document.getElementById('t_umur').value, harga: parseInt(document.getElementById('t_harga').value), image_url: currentBase64 };
      await fetch('/api/admin/ternak', {method:'POST', headers:H, body:JSON.stringify(payload)}); renderTernak();
    });
  }

  function editTernak(t) {
    openModal('Edit Ternak', [
      {id:'t_tag', label:'Tag Unik', val:t.tag, col:'col-span-1'}, {id:'t_jenis', label:'Jenis', val:t.jenis, col:'col-span-1'},
      {id:'t_bobot', label:'Bobot (kg)', type:'number', val:t.bobot, col:'col-span-1'}, {id:'t_umur', label:'Umur', val:t.umur, col:'col-span-1'},
      {id:'t_harga', label:'Harga', type:'number', val:t.harga, col:'col-span-1'}, {id:'t_status', label:'Status', type:'select', opts:['Tersedia','Dipesan','Terjual'], val:t.status, col:'col-span-1'},
      {id:'t_img', label:'Upload Foto Baru (opsional)', type:'file'}
    ], async () => {
      const payload = { tag: document.getElementById('t_tag').value, jenis: document.getElementById('t_jenis').value, bobot: parseInt(document.getElementById('t_bobot').value), umur: document.getElementById('t_umur').value, harga: parseInt(document.getElementById('t_harga').value), status: document.getElementById('t_status').value, image_url: currentBase64 || t.image_url };
      await fetch('/api/admin/ternak/'+t.id, {method:'PUT', headers:H, body:JSON.stringify(payload)}); renderTernak();
    });
  }

  function editPakan(p) {
    openModal('Edit Pakan', [ {id:'p_jenis', label:'Jenis Pakan', val:p.jenis_pakan}, {id:'p_stok', label:'Stok (kg)', type:'number', val:p.stok_kg}, {id:'p_hari', label:'Estimasi (Hari)', type:'number', val:p.estimasi_hari} ], async () => {
      await fetch('/api/admin/pakan/'+p.id, {method:'PUT', headers:H, body:JSON.stringify({jenis_pakan: document.getElementById('p_jenis').value, stok_kg: document.getElementById('p_stok').value, estimasi_hari: document.getElementById('p_hari').value})}); renderPakan();
    });
  }
  function tambahPakan() {
    openModal('Tambah Pakan', [ {id:'p_jenis', label:'Jenis Pakan'}, {id:'p_stok', label:'Stok (kg)', type:'number'}, {id:'p_hari', label:'Estimasi (Hari)', type:'number'} ], async () => {
      await fetch('/api/admin/pakan', {method:'POST', headers:H, body:JSON.stringify({jenis_pakan: document.getElementById('p_jenis').value, stok_kg: document.getElementById('p_stok').value, estimasi_hari: document.getElementById('p_hari').value})}); renderPakan();
    });
  }

  function editKes(k) {
    openModal('Edit Kesehatan', [ {id:'k_tag', label:'Tag Ternak', val:k.ternak_tag}, {id:'k_tgl', type:'date', label:'Tanggal', val:k.tanggal}, {id:'k_sakit', label:'Sakit', val:k.riwayat_sakit}, {id:'k_tindak', label:'Tindakan', val:k.tindakan}, {id:'k_vaksin', label:'Vaksin', val:k.jenis_vaksin} ], async () => {
      await fetch('/api/admin/kesehatan/'+k.id, {method:'PUT', headers:H, body:JSON.stringify({ternak_tag: document.getElementById('k_tag').value, tanggal: document.getElementById('k_tgl').value, riwayat_sakit: document.getElementById('k_sakit').value, tindakan: document.getElementById('k_tindak').value, jenis_vaksin: document.getElementById('k_vaksin').value})}); renderKesehatan();
    });
  }
  function tambahKes() {
    openModal('Tambah Kesehatan', [ {id:'k_tag', label:'Tag Ternak'}, {id:'k_tgl', type:'date', label:'Tanggal'}, {id:'k_sakit', label:'Sakit'}, {id:'k_tindak', label:'Tindakan'}, {id:'k_vaksin', label:'Vaksin'} ], async () => {
      await fetch('/api/admin/kesehatan', {method:'POST', headers:H, body:JSON.stringify({ternak_tag: document.getElementById('k_tag').value, tanggal: document.getElementById('k_tgl').value, riwayat_sakit: document.getElementById('k_sakit').value, tindakan: document.getElementById('k_tindak').value, jenis_vaksin: document.getElementById('k_vaksin').value})}); renderKesehatan();
    });
  }

  function editUser(u) {
    openModal('Edit User', [ {id:'u_name', label:'Nama', val:u.name}, {id:'u_email', label:'Email', val:u.email}, {id:'u_phone', label:'Phone', val:u.phone}, {id:'u_role', label:'Role', type:'select', opts:['pembeli','admin'], val:u.role} ], async () => {
      await fetch('/api/admin/users/'+u.id, {method:'PUT', headers:H, body:JSON.stringify({name: document.getElementById('u_name').value, email: document.getElementById('u_email').value, phone: document.getElementById('u_phone').value, role: document.getElementById('u_role').value})}); renderUsers();
    });
  }

  nav('overview'); // INIT
</script>
</body>
</html>
